<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SkillBridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h2><a href="index.html" style="color:#fff; text-decoration:none;">SkillBridge</a></h2>
  </nav>

  <div class="auth-container">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
      <h2 class="text-gradient" style="text-align:center;">Welcome Back</h2>
      <p style="text-align:center; color:var(--text-muted); margin-bottom: 2rem;">Sign in to access your dashboard</p>
      
      <form id="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="developer@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
      </form>
      
      <p style="text-align:center; margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="#" style="color:#8b5cf6;">Sign up here</a>
      </p>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
