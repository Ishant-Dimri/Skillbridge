<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Showcase | SkillBridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-layout">
  <aside class="sidebar">
    <h2 class="text-gradient" style="margin-bottom: 2rem;">SkillBridge</h2>
    <ul style="list-style: none; display: flex; flex-direction: column; gap: 1rem;">
        <li><a href="index.html" style="color: var(--text-muted); text-decoration: none;"><i class="fa-solid fa-house-user"></i> Landing Page</a></li>
        <hr style="border: 0.5px solid var(--glass-border); margin: 0.5rem 0;">
        
        <li><a href="dashboard.html" style="color: #fff; text-decoration: none;"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
        <li><a href="roadmap.html" style="color: #fff; text-decoration: none;"><i class="fa-solid fa-map"></i> Roadmaps</a></li>
        <li><a href="projects.html" style="color: #fff; text-decoration: none;"><i class="fa-solid fa-code"></i> Project Gallery</a></li>
        <li><a href="admin.html" style="color: #fff; text-decoration: none;"><i class="fa-solid fa-user-shield"></i> Admin Panel</a></li>
    </ul>
    
    <button id="logout-btn" class="btn btn-outline" style="margin-top: 3rem; width: 100%;">Logout</button>
</aside>
    <main class="main-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
            <h1 class="text-gradient">Community Projects</h1>
            <a href="upload.html" class="btn btn-primary">+ Submit Project</a>
        </div>

        <div class="project-grid" id="project-container">
            <div class="glass-card project-card">
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c" alt="Project">
                <h3>E-Commerce Dashboard</h3>
                <p style="color:var(--text-muted); font-size:0.9rem">A full-stack commerce solution built with React and Firebase.</p>
                <div style="margin: 1rem 0;">
                    <span class="tag">React</span><span class="tag">Firebase</span>
                </div>
                <a href="#" class="btn btn-outline" style="width:100%; text-align:center">View Demo</a>
            </div>
        </div>
    </main>
    <script type="module" src="projects.js"></script>
</body>
</html>
